<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbinomo — VNC</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0e17; color:#e4e7ef; font-family:system-ui,sans-serif; display:flex; flex-direction:column; height:100vh; }
  .toolbar { display:flex; align-items:center; gap:12px; padding:10px 16px; background:#131825; border-bottom:1px solid #1e2638; flex-shrink:0; }
  .toolbar h2 { font-size:15px; font-weight:600; }
  .toolbar .status { font-size:12px; color:#6b7280; margin-left:auto; }
  .toolbar .status.connected { color:#22c55e; }
  .toolbar .status.error { color:#ef4444; }
  .toolbar .status.loading { color:#f59e0b; }
  .vnc-wrap { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#0a0e17; padding:4px; }
  canvas { display:block; image-rendering:pixelated; }
  .help { font-size:12px; color:#6b7280; padding:8px 16px; background:#131825; border-top:1px solid #1e2638; flex-shrink:0; }
  .help a { color:#3b82f6; }
  .btn { padding:5px 14px; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; font-family:inherit; }
  .btn-primary { background:#3b82f6; color:white; }
  .btn-primary:hover { filter:brightness(1.15); }
  .btn-danger { background:#dc2626; color:white; }
  .btn-danger:hover { filter:brightness(1.15); }
</style>
</head>
<body>
<div class="toolbar">
  <h2>Controle Remoto</h2>
  <span class="status" id="vncStatus">Inicializando...</span>
  <button class="btn btn-primary" id="btnConnect" onclick="doConnect()" disabled>Conectar</button>
  <button class="btn btn-danger" id="btnDisconnect" onclick="doDisconnect()" disabled>Desconectar</button>
</div>
<div class="vnc-wrap">
  <canvas id="vncCanvas"></canvas>
</div>
<div class="help">
  Faca login manual no Binomo. O perfil sera salvo em <code>/data/.binomo-profile</code>.
  Depois de logado, feche esta pagina e clique "Iniciar" no dashboard.
  <a href="/" style="margin-left:8px">Voltar ao Dashboard</a>
</div>

<script type="importmap">
{
  "imports": {
    "@novnc/novnc/core/": "/novnc/core/"
  }
}
</script>

<script>
// Diagnostico de carregamento de modulos
window.__vncLog = [];
window.__vncLog.push('Script iniciado');
document.getElementById('vncStatus').textContent = 'Carregando...';
</script>
<script data-cfasync="false">
// Diagnostico de carregamento de modulos
window.__vncLog = [];
window.__vncLog.push('Script iniciado');
document.getElementById('vncStatus').textContent = 'Carregando...';
</script>
<script data-cfasync="false" type="module">
window.__vncLog.push('Module script executando');
try {
  var m = await import('@novnc/novnc/core/rfb.js');
  window.__vncLog.push('RFB importado com sucesso');
  window.__RFB = m.default;
} catch(e) {
  window.__vncLog.push('ERRO import RFB: ' + e.message);
  document.getElementById('vncStatus').textContent = 'Erro mod: ' + e.message;
}
window.__vncLog.push('Module script concluido');
document.getElementById('btnConnect').disabled = false;
document.getElementById('vncStatus').textContent = 'Pronto. Clique Conectar.';
</script>
<script>
window.__vncLog.push('Script classico iniciado');

function setStatus(msg, cls) {
  var el = document.getElementById('vncStatus');
  el.textContent = msg;
  el.className = 'status ' + (cls || '');
}

window.doConnect = async function() {
  window.__vncLog.push('doConnect chamado');
  var btnConn = document.getElementById('btnConnect');
  var btnDisc = document.getElementById('btnDisconnect');
  btnConn.disabled = true;
  setStatus('Conectando...');
  var RFB = window.__RFB;
  if (!RFB) {
    setStatus('RFB nao carregado', 'error');
    btnConn.disabled = false;
    return;
  }

  try {
    var healthRes = await fetch('/api/vnc/health');
    var health = await healthRes.json();
    window.__vncLog.push('Health: ' + JSON.stringify(health));
    if (!health.ok) {
      setStatus('x11vnc offline: ' + health.message, 'error');
      btnConn.disabled = false;
      return;
    }
    setStatus('x11vnc OK. Conectando WebSocket...');
  } catch (err) {
    window.__vncLog.push('Health error: ' + err.message);
    setStatus('Erro ao verificar VNC: ' + err.message, 'error');
    btnConn.disabled = false;
    return;
  }

  try {
    var proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    var url = proto + '//' + window.location.host + '/api/vnc/ws';
    window.__vncLog.push('Conectando WS: ' + url);

    var rfb = new RFB(document.getElementById('vncCanvas'), url, {
      credentials: { password: '' },
      shared: true,
    });
    window.__rfb = rfb;

    rfb.addEventListener('connect', function() {
      window.__vncLog.push('RFB connected');
      setStatus('Conectado', 'connected');
      btnConn.disabled = true;
      btnDisc.disabled = false;
    });

    rfb.addEventListener('disconnect', function(e) {
      var reason = (e.detail && e.detail.clean) ? 'limpo' : 'erro';
      window.__vncLog.push('RFB disconnected: ' + reason);
      var msg = 'Desconectado' + (reason === 'erro' ? ' (erro)' : '');
      setStatus(msg, 'error');
      btnConn.disabled = false;
      btnDisc.disabled = true;
    });

    rfb.addEventListener('securityfailure', function(e) {
      var reason = (e.detail && e.detail.reason) ? e.detail.reason : 'desconhecido';
      window.__vncLog.push('Security failure: ' + reason);
      setStatus('Erro seguranca: ' + reason, 'error');
      btnConn.disabled = false;
    });

    setTimeout(function() {
      if (rfb && rfb._rfbConnectionState !== 'connected') {
        window.__vncLog.push('Timeout waiting for connection');
        setStatus('Timeout: VNC nao respondeu', 'error');
      }
    }, 15000);
  } catch (err) {
    window.__vncLog.push('doConnect error: ' + err.message);
    setStatus('Erro: ' + err.message, 'error');
    btnConn.disabled = false;
  }
};

window.doDisconnect = function() {
  window.__vncLog.push('doDisconnect chamado');
  if (window.__rfb) {
    window.__rfb.disconnect();
    window.__rfb = null;
    setStatus('Desconectado');
  }
};
</script>
</body>
</html>
